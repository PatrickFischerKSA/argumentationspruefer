services:
  - type: web
    name: argumentationspruefer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LANGUAGETOOL_BASE_URL
        value: https://api.languagetool.org/v2/check
      - key: OPENAI_API_KEY
        sync: false
